<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>vocab-app</title>

  <link rel="icon" href="vocab-app.png" />
  <link rel="apple-touch-icon" href="vocab-app.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="stylesheet" href="styles.css?v=8" />
</head>
<body class="loading">
  <div class="app">
    <header class="app-header">
      <div class="header-left">
        <button
          class="control-btn toggle-btn"
          id="toggleSidebarBtn"
          aria-label="一覧の表示切替"
          aria-pressed="false"
          aria-expanded="true"
        >
          一覧
        </button>
      </div>

      <div class="header-center">
        <div class="top-bar" aria-label="vol選択">
          <button class="vol-btn" data-vol="vol1">vol.1</button>
          <button class="vol-btn" data-vol="vol2">vol.2</button>
          <button class="vol-btn" data-vol="vol3">vol.3</button>
          <button class="vol-btn" data-vol="vol4">vol.4</button>
          <button
            class="favorite-list-btn"
            id="favoriteListBtn"
            aria-label="お気に入り一覧"
          >
            ☆
          </button>
          <button
            class="difficult-list-btn"
            id="difficultListBtn"
            aria-label="苦手単語一覧"
          >
            △
          </button>
        </div>
      </div>

      <div class="header-right">
        <div class="control-stack" aria-label="学習設定">
          <button
            class="control-btn speech-sync-btn"
            id="speechSyncBtn"
            aria-label="発音同期"
            aria-pressed="false"
          >
            発音同期
          </button>

          <button
            class="control-btn challenge-btn"
            id="challengeBtn"
            aria-label="想起学習"
            aria-pressed="false"
          >
            想起学習
          </button>

          <button
            class="control-btn auto-play-btn"
            id="autoPlayBtn"
            aria-label="自動再生"
            aria-pressed="false"
          >
            自動再生
          </button>

          <button
            class="control-btn translation-btn"
            id="translationBtn"
            aria-label="訳語切替"
            aria-pressed="false"
          >
            訳語切替
          </button>

        </div>
      </div>
    </header>

    <button class="login-btn" id="loginBtn">Google でログイン</button>
    <button class="login-btn" id="logoutBtn" hidden>ログアウト</button>

    <aside class="sidebar" id="sidebar" aria-label="単語一覧">
      <div class="sidebar-search">
        <input
          id="searchInput"
          type="search"
          placeholder="検索"
          aria-label="単語や意味を検索"
        />
      </div>
      <div id="list"></div>
    </aside>

    <main class="main">
      <div class="main-layout">
        <div class="side-adjustments">
          <div class="time-controls">
            <div class="recall-time-control">
              <label for="timeSlider">
                想起時間:
                <span id="timeValue">1.5</span>s
              </label>

              <input type="range" id="timeSlider" min="1" max="3" step="0.1" value="1.5">
            </div>

            <div class="display-time-control">
              <label for="displayTimeSlider">
                表示時間:
                <span id="displayTimeValue">1.5</span>s
              </label>

              <input type="range" id="displayTimeSlider" min="1" max="3" step="0.1" value="1.5">
            </div>
          </div>

          <div class="review-panel" aria-label="頻度調整">
            <span class="review-score-label" id="reviewScoreLabel">頻度調整：0</span>
            <button
              class="control-btn review-btn decrease-review-btn"
              id="decreaseReviewBtn"
              aria-label="頻度調整を下げる"
              aria-pressed="false"
            >
              －
            </button>
            <button
              class="control-btn review-reset-btn"
              id="resetReviewBtn"
              aria-label="頻度調整をリセット"
            >
              0
            </button>
            <button
              class="control-btn review-btn increase-review-btn"
              id="increaseReviewBtn"
              aria-label="頻度調整を上げる"
              aria-pressed="false"
            >
              ＋
            </button>
          </div>
        </div>
        <div class="center-box">
          <div class="order-mode-row" aria-label="配列モード">
            <button
              class="control-btn random-btn"
              id="randomBtn"
              aria-label="乱数配列"
              aria-pressed="false"
            >
              乱数配列
            </button>
            <button
              class="control-btn frequency-btn"
              id="frequencyBtn"
              aria-label="頻度配列"
              aria-pressed="false"
            >
              頻度配列
            </button>
          </div>

          <div class="current-meta-row">
            <div class="current-vol" id="current" aria-live="polite">vol.1</div>
            <div id="progress"></div>
          </div>

          <div class="current-action-row">
            <div class="word-mark-actions" aria-label="単語マーク">
              <button
                class="control-btn favorite-toggle-btn inline-favorite"
                id="favoriteToggleBtn"
                aria-pressed="false"
              >
                ☆
              </button>
              <button
                class="control-btn difficult-toggle-btn inline-difficult"
                id="difficultToggleBtn"
                aria-pressed="false"
              >
                △
              </button>
            </div>

          </div>

          <div id="word" aria-live="polite">読み込み中...</div>
          <div id="meaning" aria-live="polite"></div>

          <div class="button-row">
            <div class="nav-box">
              <button class="main-btn" id="prevWordBtn">戻る</button>
            </div>

            <div class="nav-box">
              <div id="pronunciation" aria-live="polite"></div>
              <button class="main-btn speak-btn" id="speakWordBtn">発音</button>
            </div>

            <div class="nav-box">
              <button class="main-btn" id="nextWordBtn">進む</button>
            </div>
          </div>

          <div class="help-line">
            ← → : 前後移動　｜　Space : 発音　｜　F : ☆　｜　D : △　｜　+ - 0 : 頻度調整　｜　/ : 検索　｜　Enter : 検索巡回　｜　L : 一覧　｜　R : 乱数配列　｜　Esc : 解除
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="bootstrap.js"></script>
</body>
</html>
